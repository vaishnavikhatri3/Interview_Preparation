version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: interviewaceai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: interview
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    restart: always
    ports:
      - "8081:8081"
    environment:
      DB_DSN: "host=postgres user=postgres password=interview dbname=interviewaceai port=5432 sslmode=disable"
      JWT_SECRET: "InterviewAceAI_2026_SuperSecretKey_123456789"
      JWT_ISSUER: "interviewaceai"
      PORT: "8081"
      ACCESS_TOKEN_MINUTES: "15"
      REFRESH_TOKEN_DAYS: "7"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "80:3000"
      - "443:3000"
    environment:
      ORIGIN: "https://yourdomain.com"
      PUBLIC_API_URL: "/api"
    depends_on:
      - backend

volumes:
  postgres_data: